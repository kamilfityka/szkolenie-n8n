version: '3.8'

# =============================================================================
# SZKOLENIE n8n — 20 izolowanych instancji
# =============================================================================
# Architektura:
#   - 1x PostgreSQL (20 osobnych baz danych: n8n_01 … n8n_20)
#   - 1x Redis (współdzielony, osobne prefiksy kolejek)
#   - 20x n8n (porty 5678–5697)
#   - 20x n8n-worker (jeden worker per instancja)
#
# Uruchomienie:
#   cp .env.prod.example .env.prod
#   # edytuj .env.prod (VPS_IP, hasła, klucze)
#   docker compose -f docker-compose.prod.yaml --env-file .env.prod up -d
# =============================================================================

volumes:
  db_storage:
  redis_storage:
  n8n_storage_01:
  n8n_storage_02:
  n8n_storage_03:
  n8n_storage_04:
  n8n_storage_05:
  n8n_storage_06:
  n8n_storage_07:
  n8n_storage_08:
  n8n_storage_09:
  n8n_storage_10:
  n8n_storage_11:
  n8n_storage_12:
  n8n_storage_13:
  n8n_storage_14:
  n8n_storage_15:
  n8n_storage_16:
  n8n_storage_17:
  n8n_storage_18:
  n8n_storage_19:
  n8n_storage_20:

# ---------------------------------------------------------------------------
# Shared anchors
# ---------------------------------------------------------------------------
x-n8n-base: &n8n-base
  image: docker.n8n.io/n8nio/n8n
  restart: always
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

x-n8n-env: &n8n-env
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_USER: ${N8N_DB_USER}
  DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
  N8N_HOST: ${VPS_IP}
  N8N_PROTOCOL: http
  QUEUE_BULL_REDIS_HOST: redis
  QUEUE_HEALTH_CHECK_ACTIVE: "true"
  NODE_FUNCTION_ALLOW_BUILTIN: crypto

# ===========================================================================
# INFRASTRUKTURA
# ===========================================================================
services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      N8N_DB_USER: ${N8N_DB_USER}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD}
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./init-data-prod.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:6-alpine
    restart: always
    volumes:
      - redis_storage:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # ===========================================================================
  # UCZESTNIK 01 — port 5678
  # ===========================================================================
  n8n-01:
    <<: *n8n-base
    ports:
      - "5678:5678"
    environment:
      <<: *n8n-env
      DB_POSTGRESDB_DATABASE: n8n_01
      N8N_ENCRYPTION_KEY: ${N8N_01_ENCRYPTION_KEY}
      N8N_PORT: "5678"
      WEBHOOK_URL: http://${VPS_IP}:5678/
      EXECUTIONS_MODE: queue
      QUEUE_BULL_PREFIX: n8n-01
    volumes:
      - n8n_storage_01:/home/node/.n8n

  n8n-worker-01:
    <<: *n8n-base
    command: worker
    environment:
      <<: *n8n-env
      DB_POSTGRESDB_DATABASE: n8n_01
      N8N_ENCRYPTION_KEY: ${N8N_01_ENCRYPTION_KEY}
      EXECUTIONS_MODE: queue
      QUEUE_BULL_PREFIX: n8n-01
    volumes:
      - n8n_storage_01:/home/node/.n8n
    depends_on:
      - n8n-01

