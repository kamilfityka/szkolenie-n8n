# =============================================================================
# SZKOLENIE n8n — 20 izolowanych instancji
# =============================================================================
# Uruchomienie:
#   1. Uzupełnij participants.csv
#   2. bash generate-env.sh          → generuje .env.prod i access-list.txt
#   3. Ustaw VPS_IP w .env.prod
#   4. docker compose -f docker-compose.prod.yaml --env-file .env.prod up -d
# =============================================================================

volumes:
  db_storage:
  n8n_storage_01:
  n8n_storage_02:
  n8n_storage_03:
  n8n_storage_04:
  n8n_storage_05:
  n8n_storage_06:
  n8n_storage_07:
  n8n_storage_08:
  n8n_storage_09:
  n8n_storage_10:
  n8n_storage_11:
  n8n_storage_12:
  n8n_storage_13:
  n8n_storage_14:
  n8n_storage_15:
  n8n_storage_16:
  n8n_storage_17:
  n8n_storage_18:
  n8n_storage_19:
  n8n_storage_20:

# ---------------------------------------------------------------------------
# Shared anchors
# ---------------------------------------------------------------------------
x-n8n-base: &n8n-base
  image: docker.n8n.io/n8nio/n8n
  restart: always
  depends_on:
    postgres:
      condition: service_healthy

x-n8n-env: &n8n-env
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_USER: ${N8N_DB_USER:-}
  DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD:-}
  N8N_HOST: ${VPS_IP:-}
  N8N_PROTOCOL: http
  NODE_FUNCTION_ALLOW_BUILTIN: crypto

# ===========================================================================
# INFRASTRUKTURA
# ===========================================================================
services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: postgres
      N8N_DB_USER: ${N8N_DB_USER:-}
      N8N_DB_PASSWORD: ${N8N_DB_PASSWORD:-}
    volumes:
      - db_storage:/var/lib/postgresql/data
      - ./init-data-prod.sh:/docker-entrypoint-initdb.d/init-data.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} && psql -U ${POSTGRES_USER} -tAc "SELECT 1 FROM pg_user WHERE usename=''${N8N_DB_USER}''" | grep -q 1']
      interval: 5s
      timeout: 5s
      retries: 30

  # ===========================================================================
  # UCZESTNIK 01 — port 5678
  # ===========================================================================
  n8n-01:
    <<: *n8n-base
    ports:
      - "5678:5678"
    environment:
      <<: *n8n-env
      DB_POSTGRESDB_DATABASE: n8n_01
      N8N_ENCRYPTION_KEY: ${N8N_01_ENCRYPTION_KEY:-}
      N8N_PORT: "5678"
      WEBHOOK_URL: http://${VPS_IP:-}:5678/
      N8N_DEFAULT_ADMIN_EMAIL: ${N8N_01_ADMIN_EMAIL:-}
      N8N_DEFAULT_ADMIN_PASSWORD: ${N8N_01_ADMIN_PASSWORD:-}
    volumes:
      - n8n_storage_01:/home/node/.n8n

